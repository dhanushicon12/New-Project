{% extends 'base.html' %}
{% load static %}
{% block contents %}
<!-- Registration Section -->
<section class="hero-overlay py-20 min-h-[calc(100vh-200px)]">
    <div class="container mx-auto px-4">
        <div class="max-w-3xl mx-auto text-center">
            <!-- Registration Title -->
            <h2 class="text-3xl md:text-4xl font-bold text-white mb-6 animate-fade-in-up">
                Register as a User
            </h2>
            <!-- Registration Form -->
            <form action="{% url 'UserRegisterActions' %}" method="POST" class="border border-gray-200 border-opacity-20 p-8 rounded-xl shadow-lg animate-fade-in-up" style="animation-delay: 0.2s;">
                {% csrf_token %}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex flex-col">
                        <label for="id_name" class="text-gray-200 font-semibold mb-2">User Name</label>
                        <input type="text" class="bg-gray-900 bg-opacity-10 border border-gray-300 border-opacity-30 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-500 transition duration-300" name="name" id="id_name" required placeholder="Enter User Name">
                    </div>
                    <div class="flex flex-col">
                        <label for="id_loginid" class="text-gray-200 font-semibold mb-2">Login ID</label>
                        <input type="text" class="bg-gray-900 bg-opacity-10 border border-gray-300 border-opacity-30 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-500 transition duration-300" name="loginid" id="id_loginid" required placeholder="Enter Login ID">
                    </div>
                    <div class="flex flex-col">
                        <label for="id_password" class="text-gray-200 font-semibold mb-2">Password</label>
                        <input type="password" class="bg-gray-900 bg-opacity-10 border border-gray-300 border-opacity-30 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-500 transition duration-300" name="password" id="id_password" required placeholder="Enter Password">
                    </div>
                    <div class="flex flex-col">
                        <label for="id_mobile" class="text-gray-200 font-semibold mb-2">Mobile</label>
                        <input type="text" class="bg-gray-900 bg-opacity-10 border border-gray-300 border-opacity-30 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-500 transition duration-300" name="mobile" id="id_mobile" required placeholder="Enter Mobile Number">
                    </div>
                    <div class="flex flex-col">
                        <label for="id_email" class="text-gray-200 font-semibold mb-2">Email</label>
                        <input type="email" class="bg-gray-900 bg-opacity-10 border border-gray-300 border-opacity-30 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-500 transition duration-300" name="email" id="id_email" required placeholder="Enter Email">
                    </div>
                    <div class="flex flex-col">
                        <label for="id_locality" class="text-gray-200 font-semibold mb-2">Locality</label>
                        <input type="text" class="bg-gray-900 bg-opacity-10 border border-gray-300 border-opacity-30 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-500 transition duration-300" name="locality" id="id_locality" required placeholder="Enter Locality">
                    </div>
                    <div class="flex flex-col">
                        <label for="id_address" class="text-gray-200 font-semibold mb-2">Address</label>
                        <input type="text" class="bg-gray-900 bg-opacity-10 border border-gray-300 border-opacity-30 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-500 transition duration-300" name="address" id="id_address" required placeholder="Enter Address">
                    </div>
                    <div class="flex flex-col">
                        <label for="id_city" class="text-gray-200 font-semibold mb-2">City</label>
                        <input type="text" class="bg-gray-900 bg-opacity-10 border border-gray-300 border-opacity-30 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-500 transition duration-300" name="city" id="id_city" required placeholder="Enter City">
                    </div>
                    <div class="flex flex-col">
                        <label for="id_state" class="text-gray-200 font-semibold mb-2">State</label>
                        <input type="text" class="bg-gray-900 bg-opacity-10 border border-gray-300 border-opacity-30 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-500 transition duration-300" name="state" id="id_state" required placeholder="Enter State">
                    </div>
                    <div class="hidden">
                        <input type="text" class="bg-gray-900 bg-opacity-10 border border-gray-300 border-opacity-30 text-white rounded-lg p-3" name="status" id="id_status" value="pending">
                    </div>
                </div>
                <div class="mt-8 text-center">
                    <button type="submit" class="bg-red-500 text-white font-semibold py-3 px-8 rounded-lg shadow-lg hover:bg-amber-400 transition-colors duration-300 animate-fade-in-up" style="animation-delay: 0.4s;">
                        Register
                    </button>
                </div>
                <!-- Messages -->
                {% if messages %}
                <div class="mt-6">
                    {% for message in messages %}
                    <div class="bg-red-500 bg-opacity-20 border border-amber-500 border-opacity-40 text-amber-400 p-4 rounded-lg text-center animate-fade-in-up" style="animation-delay: 0.6s;">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}
            </form>
        </div>
    </div>
</section>
{% endblock %}
