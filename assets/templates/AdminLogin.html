{% extends 'base.html' %}
{% load static %}
{% block contents %}
<!-- Admin Login Section -->
<section class="hero-overlay py-20 min-h-[calc(100vh-200px)]">
    <div class="container mx-auto px-4">
        <div class="max-w-md mx-auto text-center">
            <!-- Admin Login Title -->
            <h2 class="text-3xl md:text-4xl font-bold text-white mb-6 animate-fade-in-up">
                Admin Login
            </h2>
            <!-- Admin Login Form -->
            <form action="{% url 'AdminLoginCheck' %}" method="POST" class="border border-gray-200 border-opacity-20 p-8 rounded-xl shadow-lg animate-fade-in-up" style="animation-delay: 0.2s;">
                {% csrf_token %}
                <div class="flex flex-col space-y-6">
                    <input type="text" class="bg-gray-900 bg-opacity-10 border border-gray-300 border-opacity-30 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-500 transition duration-300" name="loginid" required placeholder="Enter Login ID">
                    <input type="password" class="bg-gray-900 bg-opacity-10 border border-gray-300 border-opacity-30 text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-500 transition duration-300" name="pswd" required placeholder="Enter Password">
                </div>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button type="submit" class="bg-red-500 text-white font-semibold py-3 px-4 rounded-lg shadow-lg hover:bg-amber-400 transition-colors duration-300 animate-fade-in-up" style="animation-delay: 0.4s;">
                        Login
                    </button>
                    <button type="reset" class="bg-red-500 text-white font-semibold py-3 px-4 rounded-lg shadow-lg hover:bg-red-400 transition-colors duration-300 animate-fade-in-up" style="animation-delay: 0.6s;">
                        Reset
                    </button>
                </div>
                <!-- Messages -->
                {% if messages %}
                <div class="mt-6">
                    {% for message in messages %}
                    <div class="bg-amber-500 bg-opacity-20 border border-amber-500 border-opacity-40 text-amber-400 p-4 rounded-lg text-center animate-fade-in-up" style="animation-delay: 0.8s;">
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %}
            </form>
        </div>
    </div>
</section>
{% endblock %}
